[[headers]]
  for = "/*"
  [headers.values]
    # Prevent clickjacking — page cannot be embedded in an iframe
    X-Frame-Options = "DENY"
    # Prevent MIME-type sniffing
    X-Content-Type-Options = "nosniff"
    # Control referrer information sent to external sites
    Referrer-Policy = "strict-origin-when-cross-origin"
    # Restrict browser APIs not needed by this app
    Permissions-Policy = "camera=(), microphone=(), geolocation=(), payment=()"
    # Content Security Policy
    # - Scripts: self + Supabase CDN only
    # - Styles: self + Google Fonts + inline (needed for JS-generated progress bar)
    # - Fonts: Google Fonts CDN
    # - Connect: self + Supabase project only
    # - Images: self + data URIs (for assets)
    # - Frame ancestors: none (stronger than X-Frame-Options)
    Content-Security-Policy = "default-src 'self'; script-src 'self' https://cdn.jsdelivr.net; style-src 'self' https://fonts.googleapis.com 'unsafe-inline'; font-src 'self' https://fonts.gstatic.com; connect-src 'self' https://vughmtwcucegylcieats.supabase.co; img-src 'self' data:; frame-ancestors 'none'; base-uri 'self'; form-action 'none';"
